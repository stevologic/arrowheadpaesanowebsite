name: Chiefs Narrative (daily)

# Regenerates the Chiefs Narrative every day, opens an automated pull request,
# auto-merges it, and deploys the refreshed site to GitHub Pages.
#
# Providers (auto-detected in tools/chiefs_narrative/providers.py):
#   * If the OPENAI_API_KEY secret exists -> OpenAI writes the edition.
#   * Otherwise the deterministic offline writer produces a complete, cited edition.
# Nothing is required for this to run; add OPENAI_API_KEY (and optionally
# ODDS_API_KEY) as repository secrets to upgrade the writing.

on:
  schedule:
    # 11:10 UTC daily (~6:10 AM Central) — after the overnight news settles.
    - cron: "10 11 * * *"
  workflow_dispatch:
    inputs:
      provider:
        description: "Force writer (blank = auto). openai|anthropic|offline"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: chiefs-narrative
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r tools/requirements.txt

      - name: Generate the Chiefs Narrative
        env:
          CHIEFS_PROVIDER: ${{ github.event.inputs.provider }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python -m tools.chiefs_narrative.generate

      - name: Detect changes
        id: diff
        run: |
          git add -A data public/images/narrative
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No narrative changes today."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open and auto-merge pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BASE="${GITHUB_REF_NAME}"
          STAMP="$(date -u +%Y%m%d-%H%M)"
          BRANCH="narrative/update-${STAMP}"
          EDITION="$(python -c "import json;print(json.load(open('data/narrative.json'))['edition'])")"
          HEADLINE="$(python -c "import json;print(json.load(open('data/narrative.json'))['headline'])")"

          git config user.name "arrowhead-paesano-bot"
          git config user.email "actions@github.com"
          git checkout -b "$BRANCH"
          git commit -m "Chiefs Narrative: ${EDITION}" -m "${HEADLINE}"
          git push origin "$BRANCH"

          BODY="$(printf '%s\n' \
            "Automated daily refresh of the Chiefs Narrative." \
            "" \
            "**${HEADLINE}**" \
            "" \
            "- Regenerated data/narrative.json + archive from the live schedule, news wire, model projection, Vegas line and prediction markets." \
            "- Re-rendered the X's-and-O's diagrams." \
            "" \
            "Generated by the Chiefs Narrative (daily) workflow.")"

          PR_URL="$(gh pr create --base "$BASE" --head "$BRANCH" \
            --title "Chiefs Narrative — ${EDITION}" --body "$BODY")"

          echo "Opened $PR_URL"
          # Prefer GitHub auto-merge; fall back to an immediate squash merge.
          gh pr merge "$PR_URL" --squash --auto --delete-branch \
            || gh pr merge "$PR_URL" --squash --delete-branch

  deploy:
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: pages-publish
      cancel-in-progress: false
    env:
      HUGO_VERSION: 0.152.2
    steps:
      - name: Checkout (post-merge default branch)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Install Hugo
        run: |
          curl -fsSL --output "${{ runner.temp }}/hugo.tar.gz" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "${{ runner.temp }}/hugo.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Build
        run: |
          git pull --ff-only origin "${GITHUB_REF_NAME}" || true
          hugo --gc --minify
          touch dist/.nojekyll

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd dist
          git init -q -b gh-pages
          git config user.name "arrowhead-paesano-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -q -m "Deploy narrative ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages:gh-pages
