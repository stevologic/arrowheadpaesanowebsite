name: Deploy Hugo site to GitHub Pages

# GitHub Pages for this repo deploys from the `gh-pages` branch (legacy/branch
# mode) at the custom domain arrowheadpaesano.com. This workflow builds the Hugo
# site on every push to main and publishes the output to that branch, which
# triggers GitHub's Pages deployment automatically.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-publish
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.152.2
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Hugo
        run: |
          curl -fsSL --output "${{ runner.temp }}/hugo.tar.gz" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "${{ runner.temp }}/hugo.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Build
        run: |
          hugo --gc --minify
          touch dist/.nojekyll

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd dist
          git init -q -b gh-pages
          git config user.name "arrowhead-paesano-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages:gh-pages
