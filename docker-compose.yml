services:
  arrowhead-paesano:
    build: .
    image: arrowhead-paesano:latest
    container_name: arrowhead-paesano
    restart: unless-stopped
    ports:
      - "1515:1515"
    environment:
      - PORT=1515
      - FEED_CACHE_MINUTES=${FEED_CACHE_MINUTES:-15}
      - YOUTUBE_CHANNEL_ID=${YOUTUBE_CHANNEL_ID:-UCZfgwB3XweP-PehJYiQFfNw}
      - SHOPIFY_STORE_DOMAIN=${SHOPIFY_STORE_DOMAIN:-}
      - SHOPIFY_STOREFRONT_ACCESS_TOKEN=${SHOPIFY_STOREFRONT_ACCESS_TOKEN:-}
      - SHOPIFY_API_VERSION=${SHOPIFY_API_VERSION:-2026-04}
      - SHOPIFY_COLLECTION_HANDLE=${SHOPIFY_COLLECTION_HANDLE:-}
      - SHOPIFY_CACHE_MINUTES=${SHOPIFY_CACHE_MINUTES:-10}
      - AMAZON_ASSOCIATE_TAG=${AMAZON_ASSOCIATE_TAG:-}
      - AMAZON_MARKETPLACE=${AMAZON_MARKETPLACE:-www.amazon.com}
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1515/healthz"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
